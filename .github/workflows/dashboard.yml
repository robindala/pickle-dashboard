name: Build pickleball dashboard

on:
  workflow_dispatch:        # lets you run it manually from the Actions tab
  schedule:
    - cron: "*/15 * * * *"  # auto-refresh every 15 min (UTC; may run a little late)
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Manila
      DASHBOARD_OUT: site/index.html
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Build dashboard
        run: python pickle_dashboard.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
